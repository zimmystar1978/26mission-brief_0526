<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mission Briefing</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

.container{
  display:flex;
  width:100%;
  height:100%;
  overflow-x:auto;

  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;

  -webkit-overflow-scrolling:touch;

  overscroll-behavior-x:contain;

  scroll-padding-left:0;
}

.container::-webkit-scrollbar{
  display:none;
}

.slide{
  min-width:100vw;
  width:100vw;
  height:100vh;

  flex-shrink:0;

  scroll-snap-align:center;
  scroll-snap-stop:always;

  display:flex;
  justify-content:center;
  align-items:center;

  position:relative;

  background:black;

  overflow:hidden;
}

video{
  width:100%;
  height:100%;

  object-fit:contain;

  background:black;

  display:block;

  flex-shrink:0;

  transform:translateZ(0);

  margin: auto;
}

.swipe-hint{
  position:absolute;

  top:65%;
  left:50%;

  transform:translate(-50%, -50%);

  color:white;

  font-size:20px;
  font-weight:bold;

  background:rgba(0,0,0,0.6);

  padding:14px 22px;

  border-radius:40px;

  opacity:0;
  transition:0.3s;

  text-align:center;

  pointer-events:none;

  white-space:nowrap;
}

</style>
</head>

<body>

<div class="container">

  <!-- Briefing card 1 -->
  <section class="slide">
    <video controls playsinline preload="metadata">
      <source src="Mission_Brief_01_0526.mp4" type="video/mp4">
    </video>

    <div class="swipe-hint">
      ← NEXT BRIEFING →
    </div>
  </section>

  <!-- Briefing card 2 -->
  <section class="slide">
    <video controls playsinline preload="metadata">
      <source src="Mission_Brief_02_0526.mp4" type="video/mp4">
    </video>

    <div class="swipe-hint">
      ← NEXT BRIEFING →
    </div>
  </section>

  <!-- Briefing card 3 -->
  <section class="slide">
    <video controls playsinline preload="metadata">
      <source src="Mission_Brief_03_0526.mp4" type="video/mp4">
    </video>

    <div class="swipe-hint">
      ← NEXT BRIEFING →
    </div>
  </section>

  <!-- Briefing card 4 -->
  <section class="slide">
    <video controls playsinline preload="metadata">
      <source src="Mission_Brief_04_0526.mp4" type="video/mp4">
    </video>

    <div class="swipe-hint">
      ← NEXT BRIEFING →
    </div>
  </section>

  <!-- Briefing card 5 -->
  <section class="slide">
    <video controls playsinline preload="metadata">
      <source src="Mission_Brief_05_0526.mp4" type="video/mp4">
    </video>

    <div class="swipe-hint">
      END OF BRIEFING
    </div>
  </section>

</div>

<script>

const videos = document.querySelectorAll("video");

videos.forEach(video => {

  const hint =
    video.parentElement.querySelector(".swipe-hint");

  video.addEventListener("ended", () => {
    hint.style.opacity = "1";
  });

  video.addEventListener("play", () => {
    hint.style.opacity = "0";
  });

});

</script>

</body>
</html>
